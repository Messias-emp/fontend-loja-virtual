<h2>Meus Pedidos</h2>

<div *ngIf="loading">
  Carregando...
</div>

<div *ngIf="!loading && orders.length === 0">
  Você ainda não fez nenhum pedido.
</div>

<div *ngIf="orders.length > 0">
  <div *ngFor="let order of orders">
    <h3>Pedido #{{ order.id }}</h3>
    <p>Status: {{ order.status }}</p>

    <div *ngFor="let item of order.items">
      <p>
        {{ item.productName }} -
        {{ item.quantity }}x -
        R$ {{ item.price }}
      </p>
    </div>

    <hr>
  </div>
</div>
